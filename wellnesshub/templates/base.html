<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}WellnessHub - Smart HealthCare Assistant{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>

    <nav class="nav">
        <a href="/" class="brand"><span class="logo">S</span> Sanjeevani AI</a>
        <ul>
            <li><a href="/">Home</a></li>
            {% if session.get('user_id') %}
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/logout" class="cta">Logout</a></li>
            {% else %}
            <li><a href="/login">Login</a></li>
            <li><a href="/signup" class="cta">Signup</a></li>
            {% endif %}
        </ul>
    </nav>

    {% block content %}{% endblock %}

    <footer>© 2026
        <Wbr>WellnessHub </Wbr> — Preventive Healthcare & Wellness</footer>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
